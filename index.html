<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Biometrics</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
<div id="cursor"></div>
<div id="target"></div>
<div id="container">
    <div id="webcamContainer">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="webcamCanvas"></canvas>
    </div>
    <div>
        <canvas id="eyePatch" width="512" height="128"></canvas>
    </div>
    <div id="heartRateContainer">
        <p id="BPM"></p>
        <canvas id="heartRate" width="600" height="200"></canvas>
    </div>
    <div id="stats"></div>
    <div id="accuracy"></div>
</div>

<script type="module" src="/src/index.ts"></script>
</body>
</html>
