<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Biometrics</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
<div id="cursor"></div>
<div id="target"></div>
<div id="container">
     <p id="instructions">Turn your screen brightness and any lights up, avoid light directly hitting the camera, sit still close to the webcam.<br>
        Gaze tracker calibrates on last 5 clicks, and is cleared every minute.<br>
         Click in corners and center to calibrate, press 't' to test tracker accuracy.<br>
         Press 'b' for HR monitor beep.
     </p>
    <button id="startButton">Start</button>
    <div id="webcamContainer">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="webcamCanvas"></canvas>
    </div>
    <div>
        <canvas id="eyePatch" width="512" height="128"></canvas>
    </div>
    <div id="heartRateContainer">
        <p id="BPM"></p>
        <canvas id="heartRate" width="600" height="200"></canvas>
    </div>
    <div id="stats"></div>
    <div id="accuracy"></div>
</div>

<script type="module" src="main.ts"></script>
</body>
</html>
